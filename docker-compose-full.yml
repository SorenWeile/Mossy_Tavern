# Full Docker Compose with Ollama, Stable Diffusion, and UI
# Note: Stable Diffusion image is large (~20GB) and may take time to download
# If you encounter "denied" errors, try:
# 1. Pull the image first: docker pull ghcr.io/automatic1111/stable-diffusion-webui:latest
# 2. Or use a different image like stabilityai/stable-diffusion
# 3. Or run Stable Diffusion separately

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  stable-diffusion:
    image: ghcr.io/automatic1111/stable-diffusion-webui:latest
    ports:
      - "7860:7860"
    environment:
      - COMMANDLINE_ARGS=--api --listen --no-half-vae
    volumes:
      - sd_data:/stable-diffusion-webui
      - sd_output:/stable-diffusion-webui/outputs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    # Give it more time to start
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 120s

  tavern-ui:
    build: ./tavern-ui
    ports:
      - "3000:3000"
    depends_on:
      ollama:
        condition: service_healthy
      stable-diffusion:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - REACT_APP_OLLAMA_URL=http://ollama:11434
      - REACT_APP_SD_URL=http://stable-diffusion:7860
    restart: unless-stopped

volumes:
  ollama_data:
  sd_data:
  sd_output:
