# Full Docker Compose with Ollama, Stable Diffusion, and UI
# Note: Stable Diffusion image is large (~20GB) and may take time to download
# Uses the ai-dock image since ghcr.io/automatic1111/stable-diffusion-webui
# is no longer published (the original source of the README's "denied" error).

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  stable-diffusion:
    image: ghcr.io/ai-dock/stable-diffusion-webui:latest-cuda
    ports:
      - "7860:7860"
    environment:
      - WEBUI_ARGS=--api --listen --no-half-vae
      - WEB_ENABLE_AUTH=false # keep the API open for the txt2img calls in App.js
      - AUTO_UPDATE=false
    volumes:
      - sd_data:/workspace
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    # Give it more time to start
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 120s

  tavern-ui:
    build: ./tavern-ui
    ports:
      - "3000:3000"
    depends_on:
      ollama:
        condition: service_healthy
      stable-diffusion:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      # These must be browser-reachable addresses, not Docker-internal hostnames -
      # the UI calls these URLs from the user's browser, not from inside the container.
      - OLLAMA_URL=http://localhost:11434
      - SD_URL=http://localhost:7860
    restart: unless-stopped

volumes:
  ollama_data:
  sd_data:
