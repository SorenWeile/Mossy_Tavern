services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  tavern-ui:
    build: ./tavern-ui
    ports:
      - "3000:3000"
    depends_on:
      - ollama
    environment:
      - NODE_ENV=development
      - REACT_APP_OLLAMA_URL=http://localhost:11434
      - REACT_APP_SD_URL=http://localhost:7860
    restart: unless-stopped

volumes:
  ollama_data:
